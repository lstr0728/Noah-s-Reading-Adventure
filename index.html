<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="NOAH Reading">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#fff8eb">
  <link rel="manifest" href="manifest.webmanifest">
  <title>NOAH'S Reading Adventure</title>
  <style>
    :root { --blue:#2f80ed; --dark:#223; --purple:#5a3370; --gold:#b57900; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; min-height:100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; color:var(--dark); background:#fff8eb; text-align:center; }
    .screen { min-height:100vh; padding: max(18px, env(safe-area-inset-top)) 22px max(18px, env(safe-area-inset-bottom)); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; }
    h1 { font-size:54px; margin:0; color:var(--blue); letter-spacing:1px; }
    h2 { font-size:32px; margin:0 0 8px; }
    .status { font-size:20px; color:#555; margin-bottom:8px; }
    button { width:min(100%, 420px); border:0; border-radius:18px; padding:17px 18px; font-size:20px; font-weight:750; background:#2f80ed; color:white; box-shadow:0 8px 18px #0002; touch-action: manipulation; }
    button.secondary { background:#6f42c1; }
    button.light { background:white; color:#333; }
    .topbar { width:100%; display:flex; align-items:center; justify-content:space-between; gap:8px; position:absolute; top:max(10px, env(safe-area-inset-top)); left:0; padding:0 16px; }
    .progress { font-size:17px; font-weight:800; background:#ffffffaa; padding:8px 12px; border-radius:999px; }
    .gear { width:54px; height:48px; padding:0; border-radius:16px; font-size:24px; background:#ffffffdd; color:#333; box-shadow:0 4px 12px #0002; }
    .card { width:min(100%, 520px); margin-top:42px; background:#ffffffaa; border-radius:28px; padding:18px 12px; box-shadow:0 10px 28px #0001; }
    .emoji { font-size:78px; line-height:1.1; }
    .word { font-size:56px; font-weight:900; line-height:1.05; color:#14375f; margin-top:4px; }
    .fil { color:var(--purple); }
    .sentence { font-size:22px; margin-top:8px; line-height:1.25; }
    .stars { font-size:20px; font-weight:850; color:var(--gold); margin-top:8px; }
    .row { display:flex; width:min(100%, 520px); gap:10px; }
    .row button { flex:1; min-width:0; font-size:18px; padding-left:8px; padding-right:8px; }
    .modalBack { position:fixed; inset:0; background:#0005; display:none; align-items:center; justify-content:center; padding:24px; z-index:10; }
    .modal { width:min(100%, 420px); background:white; border-radius:26px; padding:18px; box-shadow:0 20px 60px #0005; }
    .modal h3 { margin:6px 0 14px; font-size:26px; }
    .modal button { margin-top:10px; }
    .small { font-size:14px; color:#666; line-height:1.35; max-width:430px; }
    @media (max-width: 380px) { .word{font-size:45px} .sentence{font-size:19px} h1{font-size:46px} }
  </style>
</head>
<body>
  <main id="home" class="screen">
    <h1>NOAH</h1>
    <h2>Reading Adventure</h2>
    <div class="status" id="homeStatus"></div>
    <button id="continueBtn">Continue Reading</button>
    <button id="settingsHomeBtn" class="light">⚙ Settings</button>
    <div class="small">iPhone/iPad: open in Safari, tap Share, then Add to Home Screen.</div>
  </main>

  <main id="reading" class="screen" style="display:none;">
    <div class="topbar"><div class="progress" id="progress"></div><button class="gear" id="settingsBtn">⚙</button></div>
    <section class="card">
      <div class="emoji" id="emoji"></div>
      <div class="word" id="enWord"></div>
      <div class="word fil" id="filWord"></div>
      <div class="sentence" id="enSentence"></div>
      <div class="sentence" id="filSentence"></div>
      <div class="stars" id="stars"></div>
    </section>
    <div class="row"><button id="speakEn">Speak English</button><button id="speakFil" class="secondary">Speak Filipino</button></div>
    <div class="row"><button id="hintBtn" class="light">Hint</button><button id="nextBtn">Next</button></div>
  </main>

  <div class="modalBack" id="modalBack">
    <div class="modal">
      <h3>Settings</h3>
      <button id="homeBtn">Home Screen</button>
      <button id="soundBtn" class="secondary"></button>
      <button id="resetBtn" class="light">Reset Progress</button>
      <button id="closeBtn" class="light">Close</button>
    </div>
  </div>

const backgrounds = ['#e3f2fd','#e8f5e9','#fff9c4','#ffebee','#f3e5f5','#fff3e0','#e0f7fa','#f0f4c3'];
const praise = ['Good job!','Well done!','Nice reading!','Excellent!','Awesome!','Very good!','Keep it up!','Fantastic!','You are doing great!','Let us read another one!'];
let index = +(localStorage.noahIndex || 0);
let stars = +(localStorage.noahStars || 0);
let soundEnabled = localStorage.noahSound !== 'false';
let hintShown = false;
let currentBg = 0;

const $ = id => document.getElementById(id);
function save() { localStorage.noahIndex=index; localStorage.noahStars=stars; localStorage.noahSound=soundEnabled; }
function updateHome() { $('homeStatus').textContent = `Stars: ${stars}   Progress: ${index+1}/${words.length}`; }
function showHome() { save(); $('reading').style.display='none'; $('home').style.display='flex'; updateHome(); closeSettings(); }
function showReading() { $('home').style.display='none'; $('reading').style.display='flex'; showWord(true); closeSettings(); }
function showWord(newBg) {
  if(index >= words.length) index = 0;
  const w = words[index];
  if(newBg) { currentBg = Math.floor(Math.random()*backgrounds.length); document.body.style.background = backgrounds[currentBg]; $('reading').style.background = backgrounds[currentBg]; }
  $('progress').textContent = `Word ${index+1} of ${words.length}`;
  $('emoji').textContent = w.image;
  $('enWord').textContent = hintShown ? w.enHint : w.en;
  $('filWord').textContent = hintShown ? w.filHint : w.fil;
  $('enSentence').textContent = w.enSentence;
  $('filSentence').textContent = w.filSentence;
  $('stars').textContent = `Stars: ${stars}`;
  $('hintBtn').textContent = hintShown ? 'Hide Hint' : 'Hint';
  save();
}
function speak(text, lang) {
  if(!soundEnabled || !('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.82;
  speechSynthesis.speak(u);
}
function nextWord() { stars++; speak(praise[Math.floor(Math.random()*praise.length)], 'en-US'); index++; if(index>=words.length) index=0; hintShown=false; showWord(true); }
function openSettings() { $('soundBtn').textContent = soundEnabled ? 'Disable Sounds' : 'Enable Sounds'; $('modalBack').style.display='flex'; }
function closeSettings() { $('modalBack').style.display='none'; }

$('continueBtn').onclick = showReading;
$('settingsHomeBtn').onclick = openSettings;
$('settingsBtn').onclick = openSettings;
$('homeBtn').onclick = showHome;
$('soundBtn').onclick = () => { soundEnabled=!soundEnabled; save(); openSettings(); };
$('resetBtn').onclick = () => { if(confirm('Reset Noah’s progress?')) { index=0; stars=0; hintShown=false; save(); updateHome(); showWord(false); closeSettings(); } };
$('closeBtn').onclick = closeSettings;
$('modalBack').onclick = e => { if(e.target.id === 'modalBack') closeSettings(); };
$('speakEn').onclick = () => { const w=words[index]; speak(w.en + '. ' + w.enSentence, 'en-US'); };
$('speakFil').onclick = () => { const w=words[index]; speak(w.fil + '. ' + w.filSentence, 'fil-PH'); };
$('hintBtn').onclick = () => { hintShown=!hintShown; showWord(false); };
$('nextBtn').onclick = nextWord;

if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
updateHome();
</script>
